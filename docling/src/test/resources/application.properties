# Test Application Configuration
camel.main.name=DoclingServeTest
spring.application.name=camel-docling-serve-test

# Directory Configuration
documents.directory=src/main/resources/documents
output.directory=src/main/resources/output

# Docling Service Configuration (will be overridden by @DynamicPropertySource)
docling.serve.url=http://localhost:5001

# Camel Route Configuration
camel.main.run-controller=false

# Logging Configuration
logging.level.org.apache.camel=INFO
logging.level.org.testcontainers=INFO
